workflows:
  ios-build:
    name: Flutter iOS unsigned build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.16.7
      vars:
        DEVELOPMENT_TEAM: ""

    scripts:
      - name: Install dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Reset iOS pods
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod repo update
          pod install
          cd ..

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign --build-name=1.0 --build-number=1

    artifacts:
      - build/ios/iphoneos/*.app