workflows:
  ios-workflow:
    name: Flutter iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable

    scripts:
      - name: Install Flutter packages
        script: |
          flutter pub get

      - name: Build iOS
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa