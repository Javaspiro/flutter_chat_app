workflows:
  ios-build:
    name: Flutter iOS unsigned build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.16.7

    scripts:
      - name: Install dependencies
        script: |
          flutter clean
          flutter pub get

      - name: Reset iOS pods
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod repo update
          pod install
          cd ..

      - name: Build iOS IPA
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa