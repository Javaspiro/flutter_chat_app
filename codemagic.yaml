workflows:
  ios-build:
    name: Flutter iOS unsigned build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.16.7

    scripts:
      - name: Install dependencies
        script: |
          flutter --version
          flutter pub get

      - name: Enable iOS platform
        script: |
          flutter config --enable-ios

      - name: Clean project
        script: |
          flutter clean

      - name: Build iOS simulator app
        script: |
          flutter build ios --simulator --release

    artifacts:
      - build/ios/iphonesimulator/*.app